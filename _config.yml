title: SwiftUI Study
description: A simple SwiftUI study site for short daily sessions.
lang: ko
timezone: Asia/Seoul
markdown: kramdown
permalink: pretty

collections:
  sessions:
    output: true
    permalink: /sessions/:name/

defaults:
  - scope:
      path: ""
      type: "sessions"
    values:
      layout: session

exclude:
  - .bundle
  - vendor
  - Gemfile
  - Gemfile.lock
  - README.md
  - CONTRIBUTING.md
  - templates
